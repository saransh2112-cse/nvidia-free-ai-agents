<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Sales Swarm</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030014; --cyan: #00f2ff; --purple: #7000ff; --panel: rgba(10, 10, 20, 0.8); }
        body { margin: 0; background: var(--bg); font-family: 'Outfit', sans-serif; color: #fff; overflow: hidden; }
        
        #nexus-grid { display: grid; grid-template-columns: 400px 1fr 450px; height: 100vh; gap: 20px; padding: 25px; box-sizing: border-box; }

        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 15px; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 45px; height: 45px; border: 2px solid var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--cyan); }
        h1 { margin: 0; font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; letter-spacing: 5px; text-transform: uppercase; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        .panel { 
            background: var(--panel); border: 1px solid rgba(112, 0, 255, 0.3); border-radius: 24px; 
            display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(30px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .panel-header { padding: 15px 25px; background: rgba(112, 0, 255, 0.1); display: flex; justify-content: space-between; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan); font-weight: 700; }

        textarea { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 1rem; padding: 25px; outline: none; resize: none; line-height: 1.6; }
        
        /* RADAR ANIMATION */
        .radar-box { height: 250px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .radar-circle { width: 180px; height: 180px; border: 1px solid var(--cyan); border-radius: 50%; position: relative; opacity: 0.3; }
        .radar-sweep { position: absolute; width: 180px; height: 180px; background: conic-gradient(from 0deg, var(--cyan), transparent 90deg); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: sweep 3s linear infinite; display: none; }
        @keyframes sweep { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .btn-nexus { 
            width: 100%; padding: 20px; border: none; background: linear-gradient(45deg, var(--purple), var(--cyan)); 
            color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s;
        }
        .btn-nexus:hover { letter-spacing: 6px; box-shadow: 0 0 40px var(--cyan); }

        .res-list { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .res-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; border-left: 3px solid var(--cyan); animation: slideIn 0.5s forwards; }
        .res-topic { font-size: 0.7rem; font-weight: 900; color: var(--cyan); text-transform: uppercase; margin-bottom: 5px; }
        .res-insight { font-size: 0.9rem; color: #ccc; }

        .dna-box { padding: 20px; border-top: 1px solid rgba(0, 242, 255, 0.1); background: rgba(0, 242, 255, 0.02); }
        .dna-label { font-size: 0.75rem; color: var(--purple); font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .dna-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .dna-fill { height: 100%; width: 0%; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); transition: width 2s cubic-bezier(0.1, 0, 0.2, 1); }

        .pitch-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .pitch-card { background: rgba(112, 0, 255, 0.05); border: 1px solid rgba(112, 0, 255, 0.2); border-radius: 16px; padding: 20px; animation: bubbleIn 0.5s forwards; }
        .pitch-subject { font-weight: 700; color: var(--cyan); margin-bottom: 10px; font-size: 0.9rem; }
        .pitch-body { font-size: 0.85rem; color: #aaa; line-height: 1.6; white-space: pre-line; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bubbleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="nexus-grid">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">NX</div>
                <h1>Nexus Sales Swarm</h1>
            </div>
            <div id="target-status" style="font-size: 0.8rem; color: #444;">STATUS: STANDBY</div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Target Data Input</span><span>Prospect Infiltration</span></div>
            <textarea id="target-input" placeholder="Paste LinkedIn profile, Company About page, or Recent Posts to initiate Nexus scan..."></textarea>
            <div class="radar-box">
                <div class="radar-circle"></div>
                <div class="radar-sweep" id="radar"></div>
                <div style="position: absolute; font-size: 0.6rem; color: var(--cyan); opacity: 0.5;">TARGET ACQUISITION MODE</div>
            </div>
            <button class="btn-nexus" id="scan-btn">Initiate Nexus Scan</button>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Research Analytics</span><span>Neural Insight</span></div>
            <div id="res-list" class="res-list">
                <div style="text-align: center; color: #222; margin-top: 150px; font-weight: 900;">AWAITING TARGET</div>
            </div>
            <div id="dna-box" class="dna-box" style="display: none;">
                <div class="dna-label" id="personality-label">PERSONALITY: ANALYZING...</div>
                <div class="dna-bar"><div class="dna-fill" id="dna-fill"></div></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Generated Pitches</span><span>The Nexus Closer</span></div>
            <div id="pitch-list" class="pitch-container">
                <div style="text-align: center; color: #222; margin-top: 150px; font-weight: 900;">SILENT</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
