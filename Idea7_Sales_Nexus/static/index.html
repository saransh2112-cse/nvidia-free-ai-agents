<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Nexus — LinkedIn AI Sales Intelligence Engine</title>
    <meta name="description" content="Paste a LinkedIn URL. Get a hyper-personalized sales pitch, objection handling, and follow-up sequence. Powered by NVIDIA NIM.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#040810;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#64748b;--blue:#3b82f6;--purple:#a855f7;--orange:#f97316;--green:#22c55e;--cyan:#06b6d4}
        html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(59,130,246,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(168,85,247,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
        body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
        .container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 60px}

        header{padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px}
        .header-inner{display:flex;align-items:center;gap:16px}
        .logo{width:48px;height:48px;background:linear-gradient(135deg,#3b82f6,#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
        .header-text h1{font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-text p{font-size:0.85rem;color:var(--muted);margin-top:2px}
        .status-pill{margin-left:auto;display:flex;align-items:center;gap:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:100px;padding:6px 14px;font-size:0.75rem;font-weight:600;color:var(--blue)}
        .pulse{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.4)}}

        .input-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:40px}
        .input-panel h2{font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}

        /* LinkedIn URL field — prominent */
        .linkedin-field{margin-bottom:20px}
        .linkedin-field label{display:block;font-size:0.7rem;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
        .linkedin-input-wrap{display:flex;align-items:center;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.3);border-radius:12px;overflow:hidden;transition:border 0.2s,box-shadow 0.2s}
        .linkedin-input-wrap:focus-within{border-color:rgba(59,130,246,0.6);box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
        .li-prefix{padding:12px 14px;color:var(--blue);font-size:0.85rem;font-weight:600;white-space:nowrap;border-right:1px solid rgba(59,130,246,0.2)}
        .linkedin-input-wrap input{flex:1;padding:12px 16px;background:transparent;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem}
        .linkedin-input-wrap input:focus{outline:none}
        .linkedin-input-wrap input::placeholder{color:#374151}

        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        @media(max-width:640px){.form-grid{grid-template-columns:1fr}}
        .field label{display:block;font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px}
        .field input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.88rem;transition:border 0.2s}
        .field input:focus{outline:none;border-color:rgba(168,85,247,0.5);box-shadow:0 0 0 3px rgba(168,85,247,0.1)}
        .field input::placeholder{color:#374151}

        #launch-btn{width:100%;padding:14px;background:linear-gradient(90deg,#3b82f6,#a855f7);border:none;border-radius:12px;cursor:pointer;color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;margin-top:6px;transition:opacity 0.2s,transform 0.1s}
        #launch-btn:hover{opacity:0.9}#launch-btn:active{transform:scale(0.99)}

        /* Loading */
        #loading{display:none;text-align:center;padding:60px 20px}
        .scan-anim{width:80px;height:80px;margin:0 auto 24px;position:relative}
        .scan-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(59,130,246,0.2);animation:ring-pulse 1.5s ease-in-out infinite}
        .scan-ring:nth-child(2){animation-delay:0.5s;border-color:rgba(168,85,247,0.2)}
        .scan-ring:nth-child(3){animation-delay:1s;border-color:rgba(59,130,246,0.1)}
        .scan-dot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
        @keyframes ring-pulse{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.6);opacity:0}}
        .loading-title{font-size:1.1rem;font-weight:600;color:var(--blue);margin-bottom:8px}
        #loading-msg{color:var(--muted);font-size:0.9rem}

        /* Results */
        #results{display:none}

        /* Profile card */
        .profile-card{background:var(--surface);border:1px solid rgba(59,130,246,0.25);border-radius:16px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
        .profile-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#a855f7);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
        .profile-info .name{font-size:1.1rem;font-weight:700}
        .profile-info .headline{font-size:0.82rem;color:var(--muted);margin-top:3px}
        .profile-info .li-link{font-size:0.75rem;color:var(--blue);margin-top:4px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
        .profile-info .li-link:hover{text-decoration:underline}
        .product-tag{margin-left:auto;text-align:right}
        .product-tag .lbl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
        .product-tag .val{font-size:0.9rem;font-weight:700;color:var(--purple)}

        /* Agent cards */
        .agents-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
        @media(max-width:640px){.agents-grid{grid-template-columns:1fr}}
        .agent-card{background:var(--surface);border-radius:16px;padding:22px;border:1px solid var(--border);transition:transform 0.2s;animation:fadeUp 0.4s ease both}
        .agent-card:hover{transform:translateY(-2px)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .agent-card:nth-child(1){animation-delay:0s}.agent-card:nth-child(2){animation-delay:0.1s}.agent-card:nth-child(3){animation-delay:0.2s}.agent-card:nth-child(4){animation-delay:0.3s}
        .agent-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
        .agent-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
        .agent-meta .role{font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
        .agent-meta .name{font-size:0.85rem;font-weight:600;color:var(--text)}
        .agent-body{font-size:0.82rem;line-height:1.7;color:#94a3b8}
        .agent-verdict{margin-top:14px;padding:6px 12px;border-radius:8px;font-size:0.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline-block}

        /* Copy button */
        .copy-btn{float:right;padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:0.7rem;cursor:pointer;transition:border-color 0.2s,color 0.2s}
        .copy-btn:hover{border-color:var(--blue);color:var(--blue)}

        .reset-btn{display:block;margin:28px auto 0;padding:10px 28px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Inter',sans-serif;font-size:0.85rem;cursor:pointer;transition:border-color 0.2s,color 0.2s}
        .reset-btn:hover{border-color:var(--blue);color:var(--blue)}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-inner">
            <div class="logo">📡</div>
            <div class="header-text">
                <h1>Sales Nexus</h1>
                <p>LinkedIn AI Sales Intelligence Engine · Powered by NVIDIA NIM</p>
            </div>
            <div class="status-pill"><div class="pulse"></div> NEXUS ONLINE</div>
        </div>
    </header>

    <div class="input-panel" id="input-panel">
        <h2>🎯 Target Acquisition</h2>

        <div class="linkedin-field">
            <label>🔗 LinkedIn Profile URL</label>
            <div class="linkedin-input-wrap">
                <span class="li-prefix">linkedin.com/in/</span>
                <input type="text" id="li_slug" placeholder="umang-yadav" value="umang-yadav">
            </div>
        </div>

        <div class="form-grid">
            <div class="field">
                <label>Your Product / Service</label>
                <input type="text" id="your_product" value="AI Agent Development Platform" placeholder="AI Agent Platform">
            </div>
            <div class="field">
                <label>Your Company</label>
                <input type="text" id="your_company" value="NovaTech AI" placeholder="NovaTech AI">
            </div>
        </div>
        <div class="field" style="margin-bottom:20px">
            <label>Value Proposition (one line)</label>
            <input type="text" id="value_prop" value="Deploy enterprise AI agents 10x faster, free, using NVIDIA NIMs" placeholder="What makes you different?">
        </div>

        <button id="launch-btn" onclick="launchNexus()">📡 Activate Nexus Intelligence Swarm</button>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="scan-anim">
            <div class="scan-ring"></div>
            <div class="scan-ring"></div>
            <div class="scan-ring"></div>
            <div class="scan-dot">🔍</div>
        </div>
        <div class="loading-title">Nexus Scanning LinkedIn...</div>
        <p id="loading-msg">Scanning public profile...</p>
    </div>

    <!-- Results -->
    <div id="results">
        <div class="profile-card">
            <div class="profile-avatar">👤</div>
            <div class="profile-info">
                <div class="name" id="p-name">—</div>
                <div class="headline" id="p-headline">—</div>
                <a class="li-link" id="p-link" href="#" target="_blank">🔗 View LinkedIn Profile</a>
            </div>
            <div class="product-tag">
                <div class="lbl">Selling</div>
                <div class="val" id="p-product">—</div>
            </div>
        </div>

        <div class="agents-grid" id="agents-grid"></div>
        <button class="reset-btn" onclick="resetNexus()">← New Target</button>
    </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
