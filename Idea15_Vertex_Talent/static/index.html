<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex — AI Talent Retention & Flight Risk Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#050a06;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;--purple:#a855f7;--amber:#f59e0b}
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(34,197,94,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 85% 85%,rgba(245,158,11,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}
        .container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 60px}
        header{padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px}
        .header-inner{display:flex;align-items:center;gap:16px}
        .logo{width:48px;height:48px;background:linear-gradient(135deg,#22c55e,#f59e0b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
        .header-text h1{font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,#22c55e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-text p{font-size:0.85rem;color:var(--muted);margin-top:2px}
        .status-pill{margin-left:auto;display:flex;align-items:center;gap:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:100px;padding:6px 14px;font-size:0.75rem;font-weight:600;color:var(--green)}
        .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.4)}}
        .input-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:40px}
        .input-panel h2{font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        @media(max-width:640px){.form-grid{grid-template-columns:1fr}}
        .field label{display:block;font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px}
        .field input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.88rem;transition:border 0.2s}
        .field input:focus{outline:none;border-color:rgba(34,197,94,0.5);box-shadow:0 0 0 3px rgba(34,197,94,0.1)}
        .field input::placeholder{color:#374151}
        #launch-btn{width:100%;padding:14px;background:linear-gradient(90deg,#22c55e,#f59e0b);border:none;border-radius:12px;cursor:pointer;color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;margin-top:6px;transition:opacity 0.2s}
        #launch-btn:hover{opacity:0.9}
        #loading{display:none;text-align:center;padding:60px 20px}
        .orbit{width:80px;height:80px;margin:0 auto 24px;border-radius:50%;border:3px solid rgba(34,197,94,0.2);position:relative;animation:spin 2s linear infinite}
        .orbit::before{content:'';position:absolute;width:14px;height:14px;background:var(--green);border-radius:50%;top:-7px;left:50%;transform:translateX(-50%);box-shadow:0 0 12px var(--green)}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .loading-title{font-size:1.1rem;font-weight:600;color:var(--green);margin-bottom:8px}
        #loading-msg{color:var(--muted);font-size:0.9rem}
        #results{display:none}
        .score-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
        .score-ring{position:relative;width:120px;height:120px;flex-shrink:0}
        .score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
        .score-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
        .score-ring .track{stroke:rgba(255,255,255,0.06)}
        .score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .score-number{font-size:1.8rem;font-weight:800;line-height:1}
        .score-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
        .score-meta h3{font-size:1.1rem;font-weight:700;margin-bottom:4px}
        .score-meta .role-tag{font-size:0.85rem;color:var(--muted);margin-bottom:8px}
        .risk-badge-large{padding:10px 24px;border-radius:100px;font-size:0.9rem;font-weight:800;display:inline-block}
        .agents-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
        @media(max-width:640px){.agents-grid{grid-template-columns:1fr}}
        .agent-card{background:var(--surface);border-radius:16px;padding:22px;border:1px solid var(--border);transition:transform 0.2s;animation:fadeUp 0.4s ease both}
        .agent-card:hover{transform:translateY(-2px)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .agent-card:nth-child(1){animation-delay:0s}.agent-card:nth-child(2){animation-delay:0.1s}.agent-card:nth-child(3){animation-delay:0.2s}.agent-card:nth-child(4){animation-delay:0.3s}
        .agent-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
        .agent-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
        .agent-meta .role{font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
        .agent-meta .name{font-size:0.85rem;font-weight:600;color:var(--text)}
        .agent-body{font-size:0.82rem;line-height:1.65;color:#94a3b8}
        .agent-verdict{margin-top:14px;padding:6px 12px;border-radius:8px;font-size:0.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline-block}
        .reset-btn{display:block;margin:28px auto 0;padding:10px 28px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Inter',sans-serif;font-size:0.85rem;cursor:pointer;transition:border-color 0.2s,color 0.2s}
        .reset-btn:hover{border-color:var(--green);color:var(--green)}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-inner">
            <div class="logo">🧲</div>
            <div class="header-text">
                <h1>Vertex</h1>
                <p>AI Talent Retention & Flight Risk Engine · Powered by NVIDIA NIM</p>
            </div>
            <div class="status-pill"><div class="pulse"></div> TALENT RADAR</div>
        </div>
    </header>
    <div class="input-panel" id="input-panel">
        <h2>👤 Employee Risk Profile</h2>
        <div class="form-grid">
            <div class="field"><label>Employee Name</label><input id="emp_name" value="Sarah Chen" placeholder="Sarah Chen"></div>
            <div class="field"><label>Role</label><input id="role" value="Senior Software Engineer" placeholder="Senior Software Engineer"></div>
            <div class="field"><label>Department</label><input id="dept" value="Engineering" placeholder="Engineering"></div>
            <div class="field"><label>Location</label><input id="location" value="San Francisco, CA" placeholder="San Francisco, CA"></div>
            <div class="field"><label>Tenure (years)</label><input id="tenure" type="number" value="3.5" step="0.5"></div>
            <div class="field"><label>Current Salary ($/yr)</label><input id="salary" type="number" value="120000"></div>
            <div class="field"><label>Last Raise (months ago)</label><input id="raise" type="number" value="18"></div>
            <div class="field"><label>Performance Level</label><input id="perf" value="Top 10%, promoted 6 months ago"></div>
        </div>
        <div class="field" style="margin-bottom:16px"><label>Recent Flight Risk Signals</label><input id="signals" value="Updated LinkedIn profile, missed 2 team events, asked about PTO payout policy"></div>
        <button id="launch-btn" onclick="launchVertex()">🧲 Run Talent Retention Swarm</button>
    </div>
    <div id="loading">
        <div class="orbit"></div>
        <div class="loading-title">Vertex Swarm Active</div>
        <p id="loading-msg">Benchmarking against market data...</p>
    </div>
    <div id="results">
        <div class="score-card">
            <div class="score-ring">
                <svg viewBox="0 0 100 100">
                    <circle class="track" cx="50" cy="50" r="45"/>
                    <circle id="score-fill" class="fill" cx="50" cy="50" r="45" fill="none" stroke-width="8" stroke-linecap="round"/>
                </svg>
                <div class="score-center">
                    <div class="score-number" id="score-number">—</div>
                    <div class="score-label">Flight Risk</div>
                </div>
            </div>
            <div class="score-meta">
                <h3 id="score-name">—</h3>
                <p class="role-tag" id="score-role">—</p>
                <div class="risk-badge-large" id="risk-badge">—</div>
            </div>
        </div>
        <div class="agents-grid" id="agents-grid"></div>
        <button class="reset-btn" onclick="resetVertex()">← New Employee Analysis</button>
    </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
