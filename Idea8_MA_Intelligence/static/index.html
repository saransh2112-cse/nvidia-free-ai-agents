<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | Neural M&A Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #010402; --money: #05f2a1; --gold: #f59e0b; --danger: #ff3e3e; --glass: rgba(10, 20, 15, 0.7); }
        body { margin: 0; background: var(--bg); font-family: 'Outfit', sans-serif; color: #fff; overflow: hidden; }
        
        /* BACKGROUND GLOW */
        .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(5, 242, 161, 0.05) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none; }

        #nexus { display: flex; flex-direction: column; height: 100vh; padding: 30px; box-sizing: border-box; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-ring { width: 50px; height: 50px; border: 3px solid var(--money); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 20px var(--money); }
        h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 2px; color: var(--money); }

        /* MAIN CONTENT AREA */
        .main-grid { display: grid; grid-template-columns: 350px 1fr 350px; flex-grow: 1; gap: 30px; }

        .card { 
            background: var(--glass); border: 1px solid rgba(5, 242, 161, 0.1); border-radius: 24px; 
            display: flex; flex-direction: column; backdrop-filter: blur(40px); position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .card-header { padding: 15px 25px; border-bottom: 1px solid rgba(5, 242, 161, 0.1); font-size: 0.75rem; letter-spacing: 2px; color: var(--money); font-weight: 900; text-transform: uppercase; }

        textarea { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 1rem; padding: 25px; outline: none; resize: none; line-height: 1.6; }
        .btn-audit { width: 100%; padding: 20px; border: none; background: var(--money); color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s; }

        /* CENTRAL HUB */
        .hub { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .radar-container { width: 450px; height: 450px; position: relative; z-index: 2; }
        
        .decision-orb { 
            margin-top: -50px; width: 100%; max-width: 500px; text-align: center; z-index: 3;
            background: rgba(255, 255, 255, 0.02); padding: 30px; border-radius: 30px; border: 1px solid rgba(5, 242, 161, 0.1);
            backdrop-filter: blur(20px);
        }
        .decision-label { font-size: 0.75rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 10px; }
        .decision-text { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 900; margin: 0; line-height: 1; }
        .decision-desc { margin-top: 20px; font-size: 0.95rem; color: #94a3b8; line-height: 1.6; max-height: 120px; overflow-y: auto; padding: 0 10px; }

        /* FLAGS */
        .flag-list { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .flag-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border-left: 4px solid var(--danger); animation: fadeIn 0.5s forwards; }
        .flag-title { font-weight: 900; font-size: 0.9rem; color: #fff; }
        .flag-body { font-size: 0.8rem; color: #64748b; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="nexus">
        <div class="header">
            <div class="logo">
                <div class="logo-ring">V</div>
                <h1>Vanguard Hub</h1>
            </div>
            <div id="status" style="color: var(--money); font-size: 0.8rem; letter-spacing: 2px;">NEURAL NETWORK: ACTIVE</div>
        </div>

        <div class="main-grid">
            <!-- ASSET INPUT -->
            <div class="card">
                <div class="card-header">Target Ingestion</div>
                <textarea id="audit-input" placeholder="DEPOSIT FINANCIAL DATA..."></textarea>
                <button class="btn-audit" id="audit-btn">Initiate Swarm Audit</button>
            </div>

            <!-- CENTRAL HUB -->
            <div class="hub">
                <div class="radar-container">
                    <canvas id="riskRadar"></canvas>
                </div>
                <div class="decision-orb">
                    <div class="decision-label">FINAL RECOMMENDATION</div>
                    <p class="decision-text" id="decision-text">AWAITING</p>
                    <div class="decision-desc" id="justification-text">Upload company data to begin the M&A intelligence audit.</div>
                </div>
            </div>

            <!-- RED FLAGS -->
            <div class="card">
                <div class="card-header">Critical Risk Vectors</div>
                <div id="flag-list" class="flag-list">
                    <div style="text-align: center; color: #222; margin-top: 150px; font-weight: 900;">SILENT</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
