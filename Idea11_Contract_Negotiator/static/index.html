<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGAL SWARM | Enterprise Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --gold: #fde047; --accent: #22d3ee; --danger: #f43f5e; --panel: rgba(15, 23, 42, 0.7); }
        body { margin: 0; background-color: var(--bg); font-family: 'Outfit', sans-serif; color: #f8fafc; overflow: hidden; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        #dashboard { display: grid; grid-template-columns: 400px 1fr 400px; height: 100vh; gap: 20px; padding: 25px; box-sizing: border-box; position: relative; }

        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(253, 224, 71, 0.2); padding-bottom: 15px; height: 80px; flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 20px; min-width: 300px; }
        .logo-box { width: 50px; height: 50px; background: var(--gold); color: black; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%); box-shadow: 0 0 30px var(--gold); flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; background: linear-gradient(to right, var(--gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* CRAZY GAUGE */
        .gauge-container { position: relative; width: 150px; height: 80px; flex-shrink: 0; }
        .gauge { width: 100%; height: 100%; border: 4px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 100px 100px 0 0; overflow: hidden; position: relative; }
        .gauge-fill { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 4px solid var(--accent); border-bottom: none; border-radius: 100px 100px 0 0; transform-origin: center bottom; transform: rotate(-180deg); transition: transform 2s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 20px var(--accent); z-index: 2; }
        .gauge-val { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: 900; color: var(--accent); z-index: 3; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }

        .panel { 
            background: var(--panel); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; 
            display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(25px); position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .panel-header { padding: 15px 25px; background: rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: 900; }

        /* SCANNER LINE */
        .scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 10; display: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        textarea { flex-grow: 1; background: transparent; border: none; color: #cbd5e1; font-family: 'Crimson Pro', serif; font-size: 1.2rem; padding: 25px; outline: none; resize: none; line-height: 1.6; }
        
        .risk-list { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .risk-card { 
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; border-left: 5px solid var(--danger); 
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .risk-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.05); }
        .risk-name { font-weight: 900; color: white; margin-bottom: 8px; font-size: 1rem; text-transform: uppercase; }
        .risk-desc { font-size: 0.9rem; color: #94a3b8; line-height: 1.5; }
        
        .duel-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .chat-bubble { padding: 15px 20px; border-radius: 18px; max-width: 90%; font-size: 0.9rem; line-height: 1.6; animation: bubbleIn 0.4s forwards; }
        .bubble-opponent { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .bubble-closer { background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.3); align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .agent-name { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-bottom: 6px; display: block; color: var(--gold); }

        .btn-action { 
            width: 100%; padding: 20px; border: none; background: var(--gold); color: black; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s;
            font-size: 1rem;
        }
        .btn-action:hover { letter-spacing: 5px; box-shadow: 0 0 40px var(--gold); }
        
        .typing::after { content: '_'; animation: blink 0.8s infinite; color: var(--accent); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bubbleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div id="dashboard">
        <div class="header">
            <div class="logo">
                <div class="logo-box">LS</div>
                <h1>Legal Swarm</h1>
            </div>
            <div class="gauge-container">
                <div class="gauge"><div class="gauge-fill" id="gauge-fill"></div></div>
                <div class="gauge-val" id="mitigation-score">0.0</div>
            </div>
        </div>

        <div class="panel">
            <div class="scanner-line" id="scanner"></div>
            <div class="panel-header"><span>Contract Feed</span><span>Source</span></div>
            <textarea id="contract-input" placeholder="DEPOSIT CORPORATE CONTRACT HERE..."></textarea>
            <button class="btn-action" id="negotiate-btn">Engage Swarm Intelligence</button>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Risk Analytics</span><span id="risk-count">READY</span></div>
            <div id="risk-list" class="risk-list">
                <div style="text-align: center; color: #334155; margin-top: 150px; font-weight: 900; letter-spacing: 2px;">AWAITING SIGNAL</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Negotiation Stream</span><span>Active Duel</span></div>
            <div id="duel-log" class="duel-container">
                <div style="text-align: center; color: #334155; margin-top: 150px; font-weight: 900; letter-spacing: 2px;">SILENT</div>
            </div>
        </div>
    </div>

    <!-- Particle Library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
