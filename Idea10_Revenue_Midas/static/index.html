<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDAS | Revenue Intelligence Swarm</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --gold: #eab308; --gold-dark: #854d0e; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); font-family: 'Outfit', sans-serif; color: #fff; overflow-y: auto; overflow-x: hidden; }
        
        #midas-hub { display: grid; grid-template-rows: 90px auto; min-height: 100vh; padding: 30px; box-sizing: border-box; gap: 25px; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(234, 179, 8, 0.2); padding-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 20px; }
        .logo-symbol { width: 50px; height: 50px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.8rem; border-radius: 12px; box-shadow: 0 0 30px var(--gold-dark); }
        h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 1px; color: var(--gold); }

        .main-deck { display: grid; grid-template-columns: 400px 1fr 400px; gap: 25px; }

        .panel { 
            background: var(--glass); border: 1px solid rgba(234, 179, 8, 0.1); border-radius: 24px; 
            display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(40px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); position: relative;
        }
        .panel-header { padding: 15px 25px; background: rgba(234, 179, 8, 0.05); font-size: 0.75rem; letter-spacing: 3px; color: var(--gold); font-weight: 900; text-transform: uppercase; border-bottom: 1px solid rgba(234, 179, 8, 0.1); }

        textarea { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 1.1rem; padding: 25px; outline: none; resize: none; line-height: 1.6; }
        .btn-midas { 
            width: 100%; padding: 25px; border: none; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); 
            color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; cursor: pointer; transition: 0.5s; 
            font-size: 1rem;
        }
        .btn-midas:hover { letter-spacing: 8px; box-shadow: 0 0 50px var(--gold); }

        /* PROFIT GAUGE */
        .gauge-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .profit-circle { width: 300px; height: 300px; border: 8px solid rgba(234, 179, 8, 0.05); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .profit-val { font-family: 'Playfair Display', serif; font-size: 6rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 40px var(--gold-dark); line-height: 1; }
        .profit-label { font-size: 0.9rem; color: #888; letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; }
        .pulse-ring { position: absolute; width: 320px; height: 320px; border: 2px solid var(--gold); border-radius: 50%; opacity: 0; animation: pulse 2s infinite; }

        /* ARBITRAGE LIST */
        .arb-list { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .arb-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; border-left: 4px solid var(--gold); animation: slideIn 0.5s forwards; }
        .arb-product { font-weight: 900; font-size: 1rem; color: #fff; }
        .arb-action { font-size: 0.75rem; color: var(--gold); text-transform: uppercase; margin-top: 5px; font-weight: 700; }
        .arb-reason { font-size: 0.85rem; color: #666; margin-top: 8px; line-height: 1.4; }

        /* FLASH OFFERS */
        .offer-list { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .offer-card { background: linear-gradient(135deg, rgba(234, 179, 8, 0.05), transparent); padding: 25px; border-radius: 20px; border: 1px solid rgba(234, 179, 8, 0.1); animation: fadeIn 0.8s forwards; }
        .offer-headline { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
        .offer-desc { font-size: 0.9rem; color: #aaa; line-height: 1.6; font-style: italic; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="midas-hub">
        <header class="header">
            <div class="logo">
                <div class="logo-symbol">$</div>
                <h1>The Midas Swarm</h1>
            </div>
            <div style="font-size: 0.75rem; color: #444; letter-spacing: 3px;">STATUS: NEURAL OPS ACTIVE</div>
        </header>

        <section class="main-deck">
            <!-- INPUT -->
            <div class="panel">
                <div class="panel-header">Market Asset Ingestion</div>
                <textarea id="market-input" placeholder="Paste product inventory, competitor pricing, or market demand signals..."></textarea>
                <button class="btn-midas" id="midas-btn">Execute Revenue Pivot</button>
            </div>

            <!-- GAUGE -->
            <div class="gauge-area">
                <div class="profit-circle">
                    <div class="pulse-ring" id="pulse-ring"></div>
                    <div class="profit-val" id="profit-val">00</div>
                    <div class="profit-label">Est. Revenue Lift</div>
                </div>
                <div style="margin-top: 40px; font-size: 0.75rem; color: var(--gold); opacity: 0.5; letter-spacing: 5px;">BILLIONAIRE GRADE INTELLIGENCE</div>
            </div>

            <!-- RESULTS -->
            <div class="panel" style="background: rgba(234, 179, 8, 0.02);">
                <div class="panel-header">Profit Waterfall</div>
                <div id="arb-list" class="arb-list">
                    <div style="text-align: center; color: #222; margin-top: 150px; font-weight: 900;">AWAITING SIGNAL</div>
                </div>
            </div>
        </section>

        <!-- FLASH OFFERS FOOTER -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 25px;">
            <div id="offer-list" class="offer-list" style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 0;">
                <!-- Flash offers will appear here -->
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
